services:
  - type: web
    name: reccloud-image2-api
    runtime: node
    plan: starter
    branch: main
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: IMAGE2_API_TOKEN
        sync: false
      - key: IMAGE2_TIMEOUT_MS
        value: "1800000"
